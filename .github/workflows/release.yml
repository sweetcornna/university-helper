name: release

# Builds and publishes the multi-arch app + web images to GHCR and cuts a
# GitHub Release. Triggered by pushing a v* tag (e.g. `git tag v1.3.0 && git
# push origin v1.3.0`), or manually via the Actions UI.
#
# First run prerequisite: the repo's Actions must be allowed to write packages
# (Settings → Actions → General → Workflow permissions: Read and write). The
# published GHCR packages default to private — make them public if you want
# anonymous `docker pull` for the one-click installer.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.3.0)"
        required: true

permissions:
  contents: write   # create the GitHub Release (and tag, on workflow_dispatch)
  packages: write   # push images to GHCR

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/sweetcornna/university-helper-app
  WEB_IMAGE: ghcr.io/sweetcornna/university-helper-web
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: ${{ env.PLATFORMS }}
          push: true
          # Public PyPI is faster/more reliable than the in-Dockerfile CN mirror
          # default when building on GitHub-hosted runners.
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple
            PIP_TRUSTED_HOST=pypi.org
          tags: |
            ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; print; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${{ steps.meta.outputs.tag }}" > release_notes.md
          fi
          {
            echo ""
            echo "## Install"
            echo '```bash'
            echo "# Linux/macOS — guided one-click deploy (pulls these images)"
            echo "git clone https://github.com/sweetcornna/university-helper.git"
            echo "cd university-helper"
            echo "bash scripts/deploy_server.sh --tag ${{ steps.meta.outputs.tag }} --domain your.domain"
            echo '```'
          } >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release_notes.md
          files: |
            docker-compose.release.yml
            scripts/deploy_server.sh
            scripts/deploy_server.ps1
