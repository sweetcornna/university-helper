name: Deploy frontend to production

# Auto-sync: every push to main that touches the frontend builds the SPA and
# publishes it to the production box (shuake.cornna.xyz) — no manual deploy
# needed. Backend changes are intentionally NOT auto-deployed (they rebuild
# containers / touch the DB) and stay a manual `docker-compose up -d --build`.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/hotfix_publish.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Publish to production
        env:
          SSH_KEY_DATA: ${{ secrets.VPS_SSH_KEY }}
          SERVER_IP: ${{ secrets.VPS_HOST }}
          SERVER_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ -z "$SSH_KEY_DATA" ] || [ -z "$SERVER_IP" ]; then
            echo "::error::Missing VPS_SSH_KEY / VPS_HOST secrets — cannot deploy." >&2
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY_DATA" > ~/.ssh/uh_deploy_key
          chmod 600 ~/.ssh/uh_deploy_key
          # Reuse the project's deploy tool (the "更新器") in key mode.
          SSH_KEY=~/.ssh/uh_deploy_key bash scripts/hotfix_publish.sh --frontend
