# Overlay for the single-public-port host (e.g. the Aliyun box for
# shuake.cornna.xyz): host nginx proxies the domain to 127.0.0.1:18082, and a
# `web` nginx container serves the built SPA + proxies /api,/ws -> app:8000.
# Use with:
#   docker compose -p university-helper \
#     -f docker-compose.server.yml -f docker-compose.newhost.yml up -d --build
services:
  web:
    image: nginx:1.27-alpine
    container_name: shuake-easy-learning-web
    restart: on-failure:5
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:18082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - shuake-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
