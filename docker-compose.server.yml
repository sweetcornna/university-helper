services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: university-helper-app:latest
    container_name: shuake-easy-learning-app
    restart: on-failure:5
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      MAIN_DB_HOST: postgres
      MAIN_DB_NAME: main_db
      MAIN_DB_USER: easylearning
      MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIN_DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      SHUAKE_COMPAT_SECRET: ${SHUAKE_COMPAT_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENFORCE_HTTPS: "false"
      ENV: ${ENV:-production}
      # When REDIS_URL is set, app/core/redis_session_store.SessionStore writes
      # through Redis; absent it falls back to in-process state (default).
      REDIS_URL: ${REDIS_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    stop_grace_period: 30s
    networks:
      - shuake-net

  postgres:
    image: postgres:15-alpine
    container_name: shuake-easy-learning-db
    restart: on-failure:5
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "log_min_duration_statement=500ms"
    environment:
      POSTGRES_USER: easylearning
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    volumes:
      - shuake-postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-easylearning} -d $${POSTGRES_DB:-main_db}"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - shuake-net

  # Opt-in Redis. Bring it up with: `docker compose --profile redis up -d redis`.
  # Then set REDIS_URL=redis://redis:6379/0 in .env and restart the app — the
  # session store will start sharing state across workers, which unlocks
  # `uvicorn --workers >1`. Until then the app uses in-process fallback.
  redis:
    image: redis:7-alpine
    container_name: shuake-easy-learning-redis
    profiles: ["redis"]
    restart: on-failure:5
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - shuake-net

networks:
  shuake-net:
    driver: bridge

volumes:
  shuake-postgres-data:
