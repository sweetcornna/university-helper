services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: shuake-easy-learning-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      MAIN_DB_HOST: postgres
      MAIN_DB_NAME: main_db
      MAIN_DB_USER: easylearning
      MAIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIN_DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      SHUAKE_COMPAT_SECRET: ${SHUAKE_COMPAT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENFORCE_HTTPS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    stop_grace_period: 30s
    networks:
      - shuake-net

  postgres:
    image: postgres:15-alpine
    container_name: shuake-easy-learning-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: easylearning
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: main_db
    volumes:
      - shuake-postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-easylearning} -d $${POSTGRES_DB:-main_db}"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - shuake-net

networks:
  shuake-net:
    driver: bridge

volumes:
  shuake-postgres-data:
