proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
# OVERWRITE (do not append) X-Forwarded-For with the real TCP peer. nginx is the
# only trusted hop here (the edge proxy), so any client-supplied XFF must be
# discarded — otherwise an attacker can prepend a spoofed IP that the app-side
# rate limiter would key on (see app/middleware/rate_limiter.py). Using
# $remote_addr instead of $proxy_add_x_forwarded_for drops the client value.
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";
