user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Rate limit zones — bucket per client IP.
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    upstream backend {
        server app:8000;
        keepalive 32;
    }

    # Modern security headers shared by every location.
    map $sent_http_content_type $csp_policy {
        default                "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'";
        ~application/json      "default-src 'none'; frame-ancestors 'none'; base-uri 'none'";
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy $csp_policy always;

        limit_conn conn_zone 50;

        location /api/v1/auth/login {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Registration is even more expensive than login (each success runs a
        # full Postgres CREATE DATABASE for the new tenant), so it must be at
        # least as strictly rate-limited. Without this it would fall through to
        # the loose api_zone (20r/s) and an attacker rotating usernames could
        # exhaust tenant DBs. Exact match so only the register endpoint is hit.
        location = /api/v1/auth/register {
            limit_req zone=login_zone burst=3 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_zone burst=40 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location = /health {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /docs {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location = /openapi.json {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /ws {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Service-worker control files must NEVER be long-cached. They have
        # STABLE names (unlike the content-hashed /assets/* files), so a
        # 1y-immutable header freezes the SW — and therefore the whole app
        # bundle it precaches — on every client (and at the CDN edge) forever,
        # making any future fix unshippable. Exact-match locations win over the
        # regex below, so these stay revalidated.
        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }
        location = /registerSW.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }
        location = /site.webmanifest {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        # Static assets — hashed filenames, safe for long-term immutable cache.
        location ~* \.(js|css|woff2|svg|png|jpg|jpeg|gif|ico)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
            try_files $uri =404;
        }

        # SPA history fallback
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }
    }
}
